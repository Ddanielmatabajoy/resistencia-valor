<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Resistencias</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h2>Calculadora de Resistencias</h2>

    <label>Tipo:</label>
    <select id="tipo">
        <option value="4">4 Bandas</option>
        <option value="5">5 Bandas</option>
    </select>

    <div id="selectors"></div>

    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado"></div>

    <div class="resistor-container">
        <div class="resistor-wire"></div>
        <div class="resistor-body">
            <div class="band" id="band1"></div>
            <div class="band" id="band2"></div>
            <div class="band" id="band3"></div>
            <div class="band" id="band4"></div>
            <div class="band" id="band5"></div>
        </div>
        <div class="resistor-wire"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
